<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker Swarm Manager — PegaProx</title>
<script src="/static/js/react.production.min.js"></script>
<script src="/static/js/react-dom.production.min.js"></script>
<script src="/static/js/babel.min.js"></script>
<link href="/static/css/tailwind.min.css" rel="stylesheet">
<style>
:root { --accent: #e57000; --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #e4e4e7; --muted: #71717a; --green: #22c55e; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 13px; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { border-color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #cc6200; }
.btn-danger { background: var(--red); border-color: var(--red); color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-sm { padding: 3px 8px; font-size: 12px; }
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(34,197,94,.15); color: var(--green); }
.badge-red { background: rgba(239,68,68,.15); color: var(--red); }
.badge-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
.badge-blue { background: rgba(59,130,246,.15); color: var(--blue); }
.badge-muted { background: rgba(113,113,122,.15); color: var(--muted); }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:hover { background: rgba(255,255,255,.03); }
.tabs { display: flex; gap: 2px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 3px; margin-bottom: 16px; overflow-x: auto; }
.tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); transition: all .15s; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { background: var(--accent); color: #fff; }
.stat-card { text-align: center; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .3s; }
input, textarea, select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 13px; width: 100%; }
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
.log-viewer { background: #000; color: #0f0; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; padding: 12px; border-radius: 8px; max-height: 500px; overflow: auto; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 9999; animation: slideIn .3s ease; }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.spinner { border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin .6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; display: inline-block; }
.stat-value { transition: all .4s ease; }
.progress-fill { transition: width .6s ease-in-out; }
.countdown-bar { height: 2px; background: var(--accent); transition: width 1s linear; position: absolute; bottom: 0; left: 0; border-radius: 1px; }
.fade-in { animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.sidebar { width: 220px; min-height: 100vh; background: var(--card); border-right: 1px solid var(--border); padding: 16px 0; position: fixed; left: 0; top: 0; }
.sidebar-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--muted); transition: all .15s; font-size: 13px; }
.sidebar-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
.sidebar-item.active { color: var(--accent); background: rgba(229,112,0,.1); border-right: 3px solid var(--accent); }
.main { margin-left: 220px; padding: 20px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
@media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API = '/api/plugins/docker_swarm/api';

async function api(path, opts = {}) {
  let res;
  try {
    res = await fetch(`${API}/${path}`, {
      ...opts,
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
  } catch (e) {
    return { error: 'Network error: ' + (e.message || e), _http: 0 };
  }
  let data = null;
  try { data = await res.json(); } catch (e) { data = { error: 'Invalid JSON response', _raw: '' }; }
  if (!data || typeof data !== 'object') data = { error: 'Empty response' };
  data._http = res.status;
  if (res.status === 403 && !data.error) data.error = 'Acceso denegado: requiere admin';
  return data;
}

// Format helpers
const fmtBytes = (b) => {
  if (!b || b === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
};

const fmtUptime = (s) => {
  if (!s) return '-';
  const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
  return d > 0 ? `${d}d ${h}h` : h > 0 ? `${h}h ${m}m` : `${m}m`;
};

const fmtAgo = (iso) => {
  if (!iso) return '-';
  const d = new Date(iso), now = new Date(), diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
};

// Toast
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'error' ? 'var(--red)' : type === 'success' ? 'var(--green)' : 'var(--blue)';
  return <div className="toast" style={{background: bg, color: '#fff'}}>{msg}</div>;
}

// Status badge
function StatusBadge({ status }) {
  const s = (status || '').toLowerCase();
  if (['running','ready','active','complete'].includes(s)) return <span className="badge badge-green">{status}</span>;
  if (['down','failed','error','rejected','shutdown','remove'].includes(s)) return <span className="badge badge-red">{status}</span>;
  if (['drain','paused','pending','preparing','starting','assigned','accepted','orphaned'].includes(s)) return <span className="badge badge-yellow">{status}</span>;
  return <span className="badge badge-muted">{status || 'unknown'}</span>;
}

// Progress bar
function ProgressBar({ percent, color }) {
  const c = percent > 90 ? 'var(--red)' : percent > 70 ? 'var(--yellow)' : color || 'var(--green)';
  return <div className="progress-bar"><div className="progress-fill" style={{width: `${Math.min(100,percent)}%`, background: c}} /></div>;
}

// Modal
function Modal({ title, onClose, children }) {
  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal" onClick={e => e.stopPropagation()}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h3 style={{fontSize:16,fontWeight:600}}>{title}</h3>
        <button className="btn btn-sm" onClick={onClose}>X</button>
      </div>
      {children}
    </div>
  </div>;
}

// ============== PAGES ==============

// DiskPruneBar — botones de limpieza manual en Dashboard.
function DiskPruneBar({ onRefresh }) {
  const [busy, setBusy] = React.useState('');
  const [result, setResult] = React.useState(null);
  const targets = [
    { id: 'build-cache', label: 'Build cache', color: 'var(--blue,#3b82f6)', confirm: false },
    { id: 'images', label: 'Imágenes >24h', color: 'var(--blue,#3b82f6)', confirm: false },
    { id: 'containers', label: 'Contenedores parados', color: 'var(--muted)', confirm: false },
    { id: 'networks', label: 'Redes no usadas', color: 'var(--muted)', confirm: false },
    { id: 'all-safe', label: 'Todo (seguro)', color: 'var(--yellow,#f59e0b)', confirm: true },
    { id: 'volumes', label: 'Volúmenes huérfanos', color: 'var(--red,#ef4444)', confirm: true },
    { id: 'all', label: 'TODO + volúmenes', color: 'var(--red,#ef4444)', confirm: true },
  ];
  async function runPrune(t) {
    if (t.confirm && !window.confirm(`⚠️  ${t.label}\n\nEsta acción afectará TODOS los nodos. ${t.id==='volumes'||t.id==='all'?'Puede borrar datos de volúmenes no montados.':'Es reversible (solo recupera espacio).'}\n\n¿Continuar?`)) return;
    setBusy(t.id); setResult(null);
    try {
      const r = await fetch(`${API}/disk/prune`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ target: t.id, all_nodes: true }) });
      const j = await r.json();
      setResult(j);
      if (onRefresh) onRefresh();
    } catch (e) { setResult({ error: String(e) }); }
    setBusy('');
  }
  return <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid var(--border)'}}>
    <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,textTransform:'uppercase'}}>Limpieza manual</div>
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      {targets.map(t => (
        <button key={t.id} disabled={!!busy}
          onClick={()=>runPrune(t)}
          style={{padding:'6px 10px',fontSize:12,background:busy===t.id?'var(--muted)':t.color,color:'#fff',border:'none',borderRadius:4,cursor:busy?'wait':'pointer',opacity:busy&&busy!==t.id?0.5:1}}>
          {busy===t.id?'…':'🧹 '+t.label}
        </button>
      ))}
    </div>
    {result && <div style={{marginTop:10,padding:10,background:'var(--bg)',borderRadius:4,fontSize:12}}>
      {result.error
        ? <span style={{color:'var(--red,#ef4444)'}}>Error: {result.error}</span>
        : <>
            <strong>{result.description}</strong> · Liberado total: <strong style={{color:'var(--green,#10b981)'}}>{result.total_freed_human}</strong>
            <details style={{marginTop:6}}><summary style={{cursor:'pointer',color:'var(--muted)'}}>Detalle por nodo</summary>
              <ul style={{margin:'6px 0 0 18px',fontSize:11}}>
                {(result.results||[]).map((r,i) => <li key={i}>{r.name||r.host}: {r.freed_bytes>0?`+${(r.freed_bytes/1024/1024).toFixed(1)} MB`:'0'} {r.exit_code!==0 && <span style={{color:'var(--red,#ef4444)'}}>(exit {r.exit_code})</span>}</li>)}
              </ul>
            </details>
          </>}
    </div>}
  </div>;
}

// DiskAutoPruneSettings — panel en Settings para política automática.
function DiskAutoPruneSettings({ toast }) {
  const [cfg, setCfg] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const [available, setAvailable] = React.useState([]);
  React.useEffect(() => {
    fetch(`${API}/disk/settings`).then(r=>r.json()).then(j => {
      setCfg(j.disk_auto_prune || {});
      setAvailable((j.available_targets||[]).filter(t => t!=='volumes' && t!=='all'));
    });
  }, []);
  if (!cfg) return <div className="card">Cargando…</div>;
  async function save() {
    setSaving(true);
    try {
      const r = await fetch(`${API}/disk/settings`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
      const j = await r.json();
      if (j.error) toast && toast('Error: '+j.error, 'error');
      else { setCfg(j.disk_auto_prune); toast && toast('Auto-prune guardado', 'success'); }
    } catch(e){ toast && toast('Error de red', 'error'); }
    setSaving(false);
  }
  async function runNow() {
    if (!window.confirm('¿Ejecutar auto-prune ahora en los nodos sobre el umbral?')) return;
    setSaving(true);
    try {
      const r = await fetch(`${API}/disk/auto-prune/run`, { method:'POST', headers:{'Content-Type':'application/json'}, body: '{}' });
      const j = await r.json();
      if (j.error) toast && toast('Error: '+j.error, 'error');
      else { setCfg(j.disk_auto_prune); toast && toast('Auto-prune ejecutado', 'success'); }
    } catch(e){ toast && toast('Error de red', 'error'); }
    setSaving(false);
  }
  const toggleTarget = (t) => setCfg(c => ({ ...c, targets: c.targets.includes(t) ? c.targets.filter(x=>x!==t) : [...c.targets, t] }));
  return <div className="card" style={{marginTop:16}}>
    <h4 style={{marginTop:0}}>🧹 Auto-prune de disco</h4>
    <p style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>
      Ejecuta limpieza automática en cada nodo cuyo disco supere el umbral. <strong>No toca volúmenes</strong> (prohibido en modo automático por seguridad).
    </p>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:16}}>
      <div>
        <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
          <input type="checkbox" checked={!!cfg.enabled} onChange={e=>setCfg({...cfg, enabled:e.target.checked})} />
          <span style={{fontWeight:600}}>{cfg.enabled?'Activo':'Desactivado'}</span>
        </label>
      </div>
      <div>
        <label style={{fontSize:12,color:'var(--muted)'}}>Umbral disco (%)</label>
        <input type="number" min={50} max={95} value={cfg.threshold_pct||80}
          onChange={e=>setCfg({...cfg, threshold_pct:parseInt(e.target.value)||80})}
          style={{width:'100%',padding:6,borderRadius:4,border:'1px solid var(--border)',background:'var(--bg)',color:'var(--fg)'}} />
        <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Se dispara cuando / supera este porcentaje en cualquier nodo</div>
      </div>
      <div>
        <label style={{fontSize:12,color:'var(--muted)'}}>Revisar cada (min)</label>
        <input type="number" min={5} max={1440} value={cfg.check_interval_min||30}
          onChange={e=>setCfg({...cfg, check_interval_min:parseInt(e.target.value)||30})}
          style={{width:'100%',padding:6,borderRadius:4,border:'1px solid var(--border)',background:'var(--bg)',color:'var(--fg)'}} />
      </div>
    </div>
    <div style={{marginTop:16}}>
      <div style={{fontSize:12,color:'var(--muted)',marginBottom:6}}>Qué limpiar (en orden)</div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {available.map(t => (
          <label key={t} style={{padding:'4px 10px',border:'1px solid var(--border)',borderRadius:4,fontSize:12,cursor:'pointer',background:cfg.targets.includes(t)?'var(--blue,#3b82f6)':'var(--bg)',color:cfg.targets.includes(t)?'#fff':'var(--fg)'}}>
            <input type="checkbox" style={{display:'none'}} checked={cfg.targets.includes(t)} onChange={()=>toggleTarget(t)} />
            {cfg.targets.includes(t)?'✓ ':''}{t}
          </label>
        ))}
      </div>
    </div>
    {cfg.last_run && <div style={{marginTop:16,padding:10,background:'var(--bg)',borderRadius:4,fontSize:12}}>
      <div style={{color:'var(--muted)'}}>Última ejecución: {new Date(cfg.last_run).toLocaleString()}</div>
      <div>Liberado: <strong style={{color:'var(--green,#10b981)'}}>{((cfg.last_run_freed_bytes||0)/1024/1024).toFixed(1)} MB</strong></div>
    </div>}
    <div style={{marginTop:16,display:'flex',gap:8}}>
      <button onClick={save} disabled={saving} style={{padding:'8px 16px',background:'var(--blue,#3b82f6)',color:'#fff',border:'none',borderRadius:4,cursor:'pointer'}}>
        {saving?'Guardando…':'💾 Guardar política'}
      </button>
      <button onClick={runNow} disabled={saving} style={{padding:'8px 16px',background:'var(--yellow,#f59e0b)',color:'#fff',border:'none',borderRadius:4,cursor:'pointer'}}>
        ▶ Ejecutar ahora
      </button>
    </div>
  </div>;
}

// Dashboard — enhanced visual design
function Dashboard({ overview, nodeStats, loadBalance, onRefresh, loading }) {
  if (!overview || overview.error) return <div className="card" style={{textAlign:'center',padding:60}}>
    <div style={{fontSize:40,marginBottom:12,opacity:.3}}>~</div>
    <p style={{color:'var(--muted)',marginBottom:8,fontSize:15}}>No hay conexion al Swarm</p>
    <p style={{fontSize:12,color:'var(--red)'}}>{overview?.error || 'Configura un host en la seccion Ajustes'}</p>
  </div>;

  const sw = overview.swarm || {};
  const totalContainers = (sw.containers_running||0) + (sw.containers_stopped||0) + (sw.containers_paused||0);
  const runPct = totalContainers > 0 ? ((sw.containers_running||0)/totalContainers*100).toFixed(0) : 0;

  // Stat card with gradient accent
  const StatCard = ({value, label, color, sub}) => (
    <div className="card" style={{padding:'20px 16px',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg, ${color}, transparent)`}}/>
      <div style={{fontSize:32,fontWeight:800,color,lineHeight:1,marginBottom:4}}>{value}</div>
      <div style={{fontSize:12,color:'var(--muted)',fontWeight:500}}>{label}</div>
      {sub && <div style={{fontSize:11,color:'var(--muted)',marginTop:4,opacity:.7}}>{sub}</div>}
    </div>
  );

  return <>
    {/* Stat cards with colored top accents */}
    <div className="grid-4" style={{marginBottom:16}}>
      <StatCard value={sw.nodes_count||0} label="Nodos" color="#3b82f6" sub={`${sw.managers||0} managers`} />
      <StatCard value={overview.services_count||0} label="Servicios" color="var(--accent)" sub="Docker Swarm" />
      <StatCard value={sw.containers_running||0} label="Containers Running" color="var(--green)" sub={`${totalContainers} total`} />
      <StatCard value={sw.images||0} label="Imagenes" color="#a855f7" sub="Across all nodes" />
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
      {/* Swarm Info — improved layout */}
      <div className="card" style={{position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,bottom:0,width:3,background:'var(--accent)'}}/>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,paddingLeft:8}}>
          <div style={{width:32,height:32,borderRadius:8,background:'rgba(229,112,0,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>S</div>
          <div>
            <h4 style={{fontSize:14,fontWeight:700}}>Swarm Cluster</h4>
            <div style={{fontSize:11,color:'var(--muted)'}}>Docker {sw.docker_version}</div>
          </div>
          <span className="live-dot" style={{marginLeft:'auto'}}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px',fontSize:13,paddingLeft:8}}>
          <div><span style={{color:'var(--muted)',fontSize:11}}>Manager Node</span><div style={{fontWeight:500}}>{sw.hostname}</div></div>
          <div><span style={{color:'var(--muted)',fontSize:11}}>OS</span><div style={{fontWeight:500}}>{(sw.os||'').replace('Ubuntu ','Ubuntu\n')}</div></div>
          <div><span style={{color:'var(--muted)',fontSize:11}}>Kernel</span><div style={{fontFamily:'monospace',fontSize:12}}>{sw.kernel}</div></div>
          <div><span style={{color:'var(--muted)',fontSize:11}}>Arquitectura</span><div style={{fontWeight:500}}>{sw.arch || 'x86_64'}</div></div>
          <div><span style={{color:'var(--muted)',fontSize:11}}>Topology</span>
            <div style={{display:'flex',gap:6,marginTop:2}}>
              <span className="badge badge-blue">{sw.managers||0} Managers</span>
              <span className="badge badge-muted">{(sw.nodes_count||0)-(sw.managers||0)} Workers</span>
            </div>
          </div>
          <div><span style={{color:'var(--muted)',fontSize:11}}>CPUs (manager)</span><div style={{fontWeight:500}}>{sw.cpus||0} cores</div></div>
        </div>
      </div>

      {/* Containers — donut-style visual */}
      <div className="card">
        <h4 style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>Container Status</h4>
        <div style={{display:'flex',alignItems:'center',gap:24}}>
          {/* Simple donut via SVG */}
          <svg width="90" height="90" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="15.915" fill="none" stroke="var(--border)" strokeWidth="3"/>
            <circle cx="18" cy="18" r="15.915" fill="none" stroke="var(--green)" strokeWidth="3"
              strokeDasharray={`${runPct} ${100-runPct}`} strokeDashoffset="25" strokeLinecap="round"
              style={{transition:'stroke-dasharray .6s ease'}}/>
            <text x="18" y="18" textAnchor="middle" dy=".1em" style={{fontSize:'8px',fill:'var(--text)',fontWeight:700}}>{runPct}%</text>
            <text x="18" y="23" textAnchor="middle" style={{fontSize:'3.5px',fill:'var(--muted)'}}>healthy</text>
          </svg>
          <div style={{display:'flex',flexDirection:'column',gap:12,flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:10,height:10,borderRadius:2,background:'var(--green)'}}/>
              <span style={{fontSize:13,flex:1}}>Running</span>
              <span style={{fontSize:20,fontWeight:700,color:'var(--green)'}}>{sw.containers_running||0}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:10,height:10,borderRadius:2,background:'var(--red)'}}/>
              <span style={{fontSize:13,flex:1}}>Stopped</span>
              <span style={{fontSize:20,fontWeight:700,color:'var(--red)'}}>{sw.containers_stopped||0}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:10,height:10,borderRadius:2,background:'var(--yellow)'}}/>
              <span style={{fontSize:13,flex:1}}>Paused</span>
              <span style={{fontSize:20,fontWeight:700,color:'var(--yellow)'}}>{sw.containers_paused||0}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    {/* Disk Usage — horizontal bars + prune actions */}
    {(overview.disk_usage||[]).length > 0 && <div className="card" style={{marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h4 style={{fontSize:13,color:'var(--muted)',margin:0}}>Disk Usage (Manager)</h4>
        <span style={{fontSize:11,color:'var(--muted)'}}>Acciones afectan TODOS los nodos</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))',gap:12}}>
        {overview.disk_usage.map((d,i) => {
          const pctMatch = (d.Reclaimable||'').match(/\((\d+)%\)/);
          const pct = pctMatch ? parseInt(pctMatch[1]) : 0;
          return <div key={i} style={{padding:12,background:'var(--bg)',borderRadius:6}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:600}}>{d.Type}</span>
              <span style={{fontSize:12,color:'var(--muted)'}}>{d.Size}</span>
            </div>
            <div style={{height:6,background:'var(--border)',borderRadius:3,overflow:'hidden',marginBottom:4}}>
              <div style={{height:'100%',width:`${100-pct}%`,background:pct>50?'var(--green)':'var(--yellow)',borderRadius:3,transition:'width .4s'}}/>
            </div>
            <div style={{fontSize:11,color:'var(--muted)'}}>{d.Reclaimable} recuperable</div>
          </div>;
        })}
      </div>
      <DiskPruneBar onRefresh={onRefresh} />
    </div>}

    {/* Task Balance Summary */}
    {loadBalance && !loadBalance.error && (() => {
      const { nodes, total_tasks, balance_score, recommendation } = loadBalance;
      const scoreColor = balance_score >= 80 ? 'var(--green)' : balance_score >= 50 ? 'var(--yellow)' : 'var(--red)';
      const colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6'];
      return <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:12}}>
          <h4 style={{fontSize:13,color:'var(--muted)',margin:0}}>Task Balance</h4>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:20,fontWeight:800,color:scoreColor}}>{balance_score}</span>
            <span style={{fontSize:11,color:'var(--muted)'}}>/100</span>
          </div>
          <span style={{fontSize:11,color:'var(--muted)',marginLeft:'auto'}}>{total_tasks} tasks</span>
        </div>
        {/* Stacked bar */}
        <div style={{display:'flex',height:20,borderRadius:4,overflow:'hidden',marginBottom:8}}>
          {nodes.map((n,i) => {
            const pct = total_tasks > 0 ? (n.tasks_running / total_tasks) * 100 : 0;
            return <div key={i} title={`${n.name}: ${n.tasks_running} tasks`}
              style={{width:`${pct}%`,background:colors[i%colors.length],minWidth:pct>0?2:0,transition:'width .3s'}} />;
          })}
        </div>
        <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
          {nodes.map((n,i) => {
            const pct = total_tasks > 0 ? ((n.tasks_running / total_tasks) * 100).toFixed(0) : 0;
            return <div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
              <span style={{width:8,height:8,borderRadius:2,background:colors[i%colors.length],display:'inline-block'}} />
              <span style={{color:'var(--muted)'}}>{n.name}</span>
              <span style={{fontWeight:600}}>{n.tasks_running}</span>
              <span style={{color:'var(--muted)',fontSize:11}}>({pct}%)</span>
            </div>;
          })}
        </div>
        {recommendation && <div style={{marginTop:8,padding:'6px 10px',background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.2)',borderRadius:4,fontSize:11,color:'var(--yellow)'}}>
          {recommendation}
        </div>}
      </div>;
    })()}

    {/* Node Resources — enhanced cards instead of plain table */}
    {nodeStats && nodeStats.stats && <div>
      <h4 style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>Recursos por Nodo</h4>
      <div className="grid-3">
        {nodeStats.stats.map((n,i) => {
          const cpuPct = n.cpu_count ? ((n.load_1m/n.cpu_count)*100).toFixed(0) : 0;
          const memPct = n.mem_total ? ((n.mem_used / n.mem_total) * 100).toFixed(1) : 0;
          const diskPct = n.disk_total ? ((n.disk_used / n.disk_total) * 100).toFixed(1) : 0;
          const cpuColor = cpuPct > 80 ? 'var(--red)' : cpuPct > 50 ? 'var(--yellow)' : 'var(--green)';
          const memColor = memPct > 80 ? 'var(--red)' : memPct > 50 ? 'var(--yellow)' : 'var(--green)';
          const diskColor = diskPct > 80 ? 'var(--red)' : diskPct > 50 ? 'var(--yellow)' : 'var(--green)';

          return <div key={i} className="card" style={{position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg, ${cpuColor}, ${memColor}, ${diskColor})`}}/>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div>
                <div style={{fontSize:15,fontWeight:700}}>{n.name || n.hostname}</div>
                <div style={{fontSize:11,color:'var(--muted)',fontFamily:'monospace'}}>{n.host}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <span className="live-dot" style={{width:6,height:6}}/>{' '}
                <span style={{fontSize:11,color:'var(--muted)'}}>{fmtUptime(n.uptime_seconds)}</span>
              </div>
            </div>

            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                  <span style={{color:'var(--muted)'}}>CPU</span>
                  <span style={{color:cpuColor,fontWeight:600}}>{n.load_1m} / {n.cpu_count} cores ({cpuPct}%)</span>
                </div>
                <ProgressBar percent={cpuPct} color={cpuColor} />
              </div>
              <div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                  <span style={{color:'var(--muted)'}}>RAM</span>
                  <span style={{color:memColor,fontWeight:600}}>{fmtBytes(n.mem_used)} / {fmtBytes(n.mem_total)} ({memPct}%)</span>
                </div>
                <ProgressBar percent={memPct} color={memColor} />
              </div>
              <div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                  <span style={{color:'var(--muted)'}}>Disco</span>
                  <span style={{color:diskColor,fontWeight:600}}>{fmtBytes(n.disk_used)} / {fmtBytes(n.disk_total)} ({diskPct}%)</span>
                </div>
                <ProgressBar percent={diskPct} color={diskColor} />
              </div>
            </div>
          </div>;
        })}
      </div>
    </div>}

    <div style={{textAlign:'right',marginTop:12,fontSize:11,color:'var(--muted)',display:'flex',alignItems:'center',justifyContent:'flex-end',gap:8}}>
      <span className="live-dot" /> En vivo — Actualizado: {overview.updated_at ? new Date(overview.updated_at).toLocaleTimeString() : '-'}
    </div>
  </>;
}

// Nodes
function Nodes({ data }) {
  if (!data || !data.length) return <div className="card" style={{padding:20,color:'var(--muted)'}}>Sin nodos</div>;
  return <div className="card">
    <table>
      <thead><tr><th>ID</th><th>Hostname</th><th>Status</th><th>Availability</th><th>Role</th><th>Engine</th><th>IP</th><th>CPU</th><th>RAM</th></tr></thead>
      <tbody>{data.map((n,i) => <tr key={i}>
        <td style={{fontFamily:'monospace',fontSize:12}}>{(n.ID||'').substring(0,12)}</td>
        <td><strong>{n.Hostname}</strong></td>
        <td><StatusBadge status={n.state || n.Status} /></td>
        <td><StatusBadge status={n.Availability} /></td>
        <td><span className={`badge ${n.ManagerStatus ? 'badge-blue' : 'badge-muted'}`}>{n.ManagerStatus || 'Worker'}</span></td>
        <td>{n.engine_version || n.EngineVersion}</td>
        <td style={{fontFamily:'monospace',fontSize:12}}>{n.addr || '-'}</td>
        <td>{n.resources?.cpus ? n.resources.cpus.toFixed(0) + ' cores' : '-'}</td>
        <td>{n.resources?.memory_bytes ? fmtBytes(n.resources.memory_bytes) : '-'}</td>
      </tr>)}</tbody>
    </table>
  </div>;
}

// Service Detail — Portainer-style full service view
function ServiceDetail({ serviceId, onBack, toast }) {
  const [svc, setSvc] = useState(null);
  const [loading, setLoading] = useState(true);
  const [section, setSection] = useState('details');
  const [logs, setLogs] = useState('');
  const [logsLoading, setLogsLoading] = useState(false);
  const [editReplicas, setEditReplicas] = useState('');
  const [editImage, setEditImage] = useState('');
  const [unmasked, setUnmasked] = useState(false);

  const load = async (opts = {}) => {
    setLoading(true);
    const q = opts.unmask ? '&unmask=1' : '';
    const d = await api(`service-detail?service_id=${encodeURIComponent(serviceId)}${q}`);
    if (d._http === 403) toast(d.error || 'Acceso denegado', 'error');
    setSvc(d); setEditReplicas(d.replicas ?? ''); setEditImage(d.image?.split('@')[0] || '');
    setUnmasked(!!opts.unmask && d.env_masked === false);
    setLoading(false);
  };
  useEffect(() => { load(); }, [serviceId]);

  const toggleUnmask = async () => {
    if (unmasked) { setUnmasked(false); load(); return; }
    if (!confirm('Mostrar valores reales de variables sensibles? Esta acción queda registrada en el audit log.')) return;
    load({ unmask: true });
  };

  const loadLogs = async () => { setLogsLoading(true); const r = await api(`service-logs?service_id=${encodeURIComponent(serviceId)}&tail=200`); setLogs(r.logs||''); setLogsLoading(false); };

  const doUpdate = async () => {
    const body = { service_id: serviceId };
    if (editImage !== (svc.image?.split('@')[0]||'')) body.image = editImage;
    if (svc.mode_type === 'replicated' && parseInt(editReplicas) !== svc.replicas) body.replicas = parseInt(editReplicas);
    const r = await api('service-update', {method:'POST', body});
    if (r.success) { toast('Servicio actualizado','success'); load(); } else toast(r.error,'error');
  };
  const doRollback = async () => { if(!confirm('Rollback este servicio a la version anterior?'))return; const r=await api('service-rollback',{method:'POST',body:{service_id:serviceId}}); if(r.success){toast('Rollback exitoso','success');load();}else toast(r.error,'error'); };
  const doRestart = async () => { const r=await api('service-restart',{method:'POST',body:{service_id:serviceId}}); if(r.success){toast('Reiniciado','success');load();}else toast(r.error,'error'); };
  const doRemove = async () => { if(!confirm(`ELIMINAR servicio ${serviceId}?`))return; const r=await api('service-remove',{method:'POST',body:{service_id:serviceId}}); if(r.success){toast('Eliminado','success');onBack();}else toast(r.error,'error'); };

  const fmtNano = (ns) => ns ? `${(ns/1e9).toFixed(1)}s` : '-';
  const fmtNanoCpu = (n) => n ? (n/1e9).toFixed(2) : '-';
  const fmtMemLimit = (b) => b ? fmtBytes(b) : '-';

  if (loading) return <div style={{textAlign:'center',padding:40}}><span className="spinner"/> Cargando servicio...</div>;
  if (!svc || svc.error) return <div className="card" style={{padding:20,color:'var(--red)'}}>{svc?.error||'Error'}</div>;

  const sections = [
    {id:'details',label:'Detalles'},
    {id:'env',label:'Variables de Entorno'},
    {id:'image',label:'Container Image'},
    {id:'labels',label:'Labels'},
    {id:'mounts',label:'Mounts'},
    {id:'network',label:'Network & Puertos'},
    {id:'resources',label:'Recursos'},
    {id:'placement',label:'Placement'},
    {id:'restart',label:'Restart Policy'},
    {id:'update',label:'Update Config'},
    {id:'logging',label:'Logging'},
    {id:'secrets',label:'Configs & Secrets'},
    {id:'tasks',label:'Tasks'},
    {id:'logs',label:'Logs'},
  ];

  const Row = ({label, val, mono}) => <tr><td style={{color:'var(--muted)',width:200,fontSize:13}}>{label}</td><td style={mono?{fontFamily:'monospace',fontSize:12}:{fontSize:13}}>{val||'-'}</td></tr>;

  return <>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
      <button className="btn btn-sm" onClick={onBack}>← Volver</button>
      <h3 style={{fontSize:16,fontWeight:700}}>Service details</h3>
      <span style={{fontSize:12,color:'var(--muted)',fontFamily:'monospace'}}>{svc.name}</span>
    </div>

    <div style={{display:'flex',gap:16}}>
      {/* Main content */}
      <div style={{flex:1}}>
        {section==='details' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12,display:'flex',alignItems:'center',gap:8}}>Service details</h4>
          <table style={{width:'100%'}}><tbody>
            <Row label="Name" val={svc.name} />
            <Row label="ID" val={svc.id} mono />
            <Row label="Created at" val={svc.created ? new Date(svc.created).toLocaleString() : '-'} />
            <Row label="Last updated at" val={svc.updated ? new Date(svc.updated).toLocaleString() : '-'} />
            <Row label="Version" val={svc.version} />
            <Row label="Scheduling mode" val={svc.mode_type} />
          </tbody></table>

          <div style={{marginTop:16,display:'flex',gap:12,alignItems:'flex-end'}}>
            {svc.mode_type==='replicated' && <div>
              <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Replicas</label>
              <input type="number" value={editReplicas} onChange={e=>setEditReplicas(e.target.value)} min={0} max={100} style={{width:80}} />
            </div>}
            <div style={{flex:1}}>
              <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Image</label>
              <input value={editImage} onChange={e=>setEditImage(e.target.value)} style={{fontFamily:'monospace',fontSize:12}} />
            </div>
          </div>

          <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Full: {svc.image}</div>

          {svc.has_previous_spec && <div style={{marginTop:12,padding:8,background:'rgba(234,179,8,.1)',borderRadius:6,fontSize:12,color:'var(--yellow)'}}>
            Rollback disponible. Imagen anterior: {svc.previous_image?.split('@')[0] || 'unknown'}
          </div>}

          <div style={{marginTop:16,display:'flex',gap:8,flexWrap:'wrap',borderTop:'1px solid var(--border)',paddingTop:12}}>
            <button className="btn btn-sm" onClick={()=>{setSection('logs');loadLogs();}}>Service logs</button>
            <button className="btn btn-sm btn-primary" onClick={doUpdate}>Update the service</button>
            {svc.has_previous_spec && <button className="btn btn-sm" style={{background:'var(--yellow)',borderColor:'var(--yellow)',color:'#000'}} onClick={doRollback}>Rollback the service</button>}
            <button className="btn btn-sm btn-danger" onClick={doRemove}>Delete the service</button>
          </div>
        </div>}

        {section==='env' && <div className="card fade-in">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <h4 style={{fontSize:14,fontWeight:600,margin:0}}>Environment variables ({svc.env?.length||0})</h4>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {svc.env_masked && <span style={{fontSize:11,color:'var(--muted)'}}>Valores sensibles ocultos</span>}
              <button className="btn btn-sm" onClick={toggleUnmask}>
                {unmasked ? 'Ocultar' : 'Mostrar reales (admin)'}
              </button>
            </div>
          </div>
          {(svc.env||[]).length ? <div style={{background:'var(--bg)',borderRadius:6,padding:8,fontFamily:'monospace',fontSize:12,maxHeight:400,overflow:'auto'}}>
            {svc.env.map((e,i)=>{const [k,...v]=e.split('=');const val=v.join('=');const sensitive=/password|secret|token|apikey|api_key|jwt|bearer|auth|private|credential|dsn|passwd|passphrase/i.test(k);const serverMasked=val==='***';
              return <div key={i} style={{padding:'3px 0',borderBottom:'1px solid var(--border)'}}><span style={{color:'var(--blue)'}}>{k}</span>=<span style={{color:sensitive||serverMasked?'var(--red)':'var(--green)'}}>{val}</span></div>;})}
          </div> : <div style={{color:'var(--muted)'}}>No hay variables de entorno</div>}
        </div>}

        {section==='image' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Container image</h4>
          <table style={{width:'100%'}}><tbody>
            <Row label="Image" val={svc.image?.split('@')[0]} mono />
            <Row label="Digest" val={svc.image?.includes('@') ? svc.image.split('@')[1] : '-'} mono />
            <Row label="Command" val={(svc.command||[]).join(' ')} mono />
            <Row label="Arguments" val={(svc.args||[]).join(' ')} mono />
            <Row label="Working Dir" val={svc.dir} mono />
            <Row label="User" val={svc.user} />
            <Row label="Hostname" val={svc.hostname} />
            <Row label="Read Only" val={svc.read_only?'Yes':'No'} />
            <Row label="Init" val={svc.init===true?'Yes':svc.init===false?'No':'-'} />
            <Row label="Stop Grace Period" val={fmtNano(svc.stop_grace_period)} />
          </tbody></table>
          {svc.healthcheck && Object.keys(svc.healthcheck).length>0 && <>
            <h5 style={{fontSize:13,color:'var(--muted)',marginTop:12}}>Healthcheck</h5>
            <table style={{width:'100%'}}><tbody>
              <Row label="Test" val={(svc.healthcheck.Test||[]).join(' ')} mono />
              <Row label="Interval" val={fmtNano(svc.healthcheck.Interval)} />
              <Row label="Timeout" val={fmtNano(svc.healthcheck.Timeout)} />
              <Row label="Retries" val={svc.healthcheck.Retries} />
            </tbody></table>
          </>}
        </div>}

        {section==='labels' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Service labels</h4>
          {Object.entries(svc.service_labels||{}).length ? <div style={{background:'var(--bg)',borderRadius:6,padding:8,fontFamily:'monospace',fontSize:12}}>
            {Object.entries(svc.service_labels).map(([k,v],i)=><div key={i} style={{padding:'3px 0',borderBottom:'1px solid var(--border)'}}><span style={{color:'var(--blue)'}}>{k}</span>=<span style={{color:'var(--green)'}}>{v}</span></div>)}
          </div> : <div style={{color:'var(--muted)'}}>No hay labels</div>}
          <h4 style={{fontSize:14,fontWeight:600,marginTop:16,marginBottom:12}}>Container labels</h4>
          {Object.entries(svc.container_labels||{}).length ? <div style={{background:'var(--bg)',borderRadius:6,padding:8,fontFamily:'monospace',fontSize:12}}>
            {Object.entries(svc.container_labels).map(([k,v],i)=><div key={i} style={{padding:'3px 0',borderBottom:'1px solid var(--border)'}}><span style={{color:'var(--blue)'}}>{k}</span>=<span style={{color:'var(--green)'}}>{v}</span></div>)}
          </div> : <div style={{color:'var(--muted)'}}>No hay container labels</div>}
        </div>}

        {section==='mounts' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Mounts ({(svc.mounts||[]).length})</h4>
          {(svc.mounts||[]).length ? <table><thead><tr><th>Tipo</th><th>Source</th><th>Target</th><th>ReadOnly</th></tr></thead>
            <tbody>{svc.mounts.map((m,i)=><tr key={i}><td><span className="badge badge-blue">{m.Type}</span></td><td style={{fontFamily:'monospace',fontSize:12}}>{m.Source||'-'}</td><td style={{fontFamily:'monospace',fontSize:12}}>{m.Target}</td><td>{m.ReadOnly?'Yes':'No'}</td></tr>)}</tbody>
          </table> : <div style={{color:'var(--muted)'}}>No hay mounts</div>}
        </div>}

        {section==='network' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Network & published ports</h4>
          <table style={{width:'100%'}}><tbody>
            <Row label="Endpoint Mode" val={svc.endpoint_mode} />
          </tbody></table>
          {(svc.published_ports||[]).length>0 && <>
            <h5 style={{fontSize:13,color:'var(--muted)',marginTop:12}}>Published ports</h5>
            <table><thead><tr><th>Published</th><th>Target</th><th>Protocol</th><th>Mode</th></tr></thead>
              <tbody>{svc.published_ports.map((p,i)=><tr key={i}><td>{p.PublishedPort}</td><td>{p.TargetPort}</td><td>{p.Protocol}</td><td>{p.PublishMode||'ingress'}</td></tr>)}</tbody>
            </table>
          </>}
          {(svc.virtual_ips||[]).length>0 && <>
            <h5 style={{fontSize:13,color:'var(--muted)',marginTop:12}}>Virtual IPs</h5>
            {svc.virtual_ips.map((v,i)=><div key={i} style={{fontFamily:'monospace',fontSize:12}}>{v.Addr} (Network: {(v.NetworkID||'').substring(0,12)})</div>)}
          </>}
        </div>}

        {section==='resources' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Resource limits & reservations</h4>
          <table style={{width:'100%'}}><tbody>
            <Row label="CPU Limit" val={fmtNanoCpu(svc.resource_limits?.NanoCPUs)} />
            <Row label="Memory Limit" val={fmtMemLimit(svc.resource_limits?.MemoryBytes)} />
            <Row label="CPU Reservation" val={fmtNanoCpu(svc.resource_reservations?.NanoCPUs)} />
            <Row label="Memory Reservation" val={fmtMemLimit(svc.resource_reservations?.MemoryBytes)} />
          </tbody></table>
        </div>}

        {section==='placement' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Placement constraints</h4>
          {(svc.constraints||[]).length ? <div style={{background:'var(--bg)',borderRadius:6,padding:8,fontFamily:'monospace',fontSize:12}}>
            {svc.constraints.map((c,i)=><div key={i} style={{padding:'2px 0'}}>{c}</div>)}
          </div> : <div style={{color:'var(--muted)'}}>No hay constraints</div>}
          <h4 style={{fontSize:14,fontWeight:600,marginTop:16,marginBottom:12}}>Placement preferences</h4>
          {(svc.preferences||[]).length ? <div style={{background:'var(--bg)',borderRadius:6,padding:8,fontFamily:'monospace',fontSize:12}}>
            {svc.preferences.map((p,i)=><div key={i}>{JSON.stringify(p)}</div>)}
          </div> : <div style={{color:'var(--muted)'}}>No hay preferences</div>}
          {svc.max_replicas>0 && <div style={{marginTop:8}}><Row label="Max replicas per node" val={svc.max_replicas}/></div>}
        </div>}

        {section==='restart' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Restart policy</h4>
          <table style={{width:'100%'}}><tbody>
            <Row label="Condition" val={svc.restart_condition} />
            <Row label="Delay" val={fmtNano(svc.restart_delay)} />
            <Row label="Max Attempts" val={svc.restart_max_attempts||'unlimited'} />
            <Row label="Window" val={fmtNano(svc.restart_window)} />
          </tbody></table>
        </div>}

        {section==='update' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Update configuration</h4>
          <table style={{width:'100%'}}><tbody>
            <Row label="Parallelism" val={svc.update_parallelism} />
            <Row label="Delay" val={fmtNano(svc.update_delay)} />
            <Row label="Failure Action" val={svc.update_failure_action} />
            <Row label="Monitor" val={fmtNano(svc.update_monitor)} />
            <Row label="Max Failure Ratio" val={svc.update_max_failure_ratio} />
            <Row label="Order" val={svc.update_order} />
          </tbody></table>
          <h4 style={{fontSize:14,fontWeight:600,marginTop:16,marginBottom:12}}>Rollback configuration</h4>
          <table style={{width:'100%'}}><tbody>
            <Row label="Parallelism" val={svc.rollback_parallelism} />
            <Row label="Delay" val={fmtNano(svc.rollback_delay)} />
            <Row label="Failure Action" val={svc.rollback_failure_action} />
            <Row label="Order" val={svc.rollback_order} />
          </tbody></table>
        </div>}

        {section==='logging' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Logging</h4>
          <table style={{width:'100%'}}><tbody>
            <Row label="Driver" val={svc.log_driver||'default (json-file)'} />
          </tbody></table>
          {Object.keys(svc.log_options||{}).length>0 && <div style={{marginTop:8,background:'var(--bg)',borderRadius:6,padding:8,fontFamily:'monospace',fontSize:12}}>
            {Object.entries(svc.log_options).map(([k,v],i)=><div key={i}><span style={{color:'var(--blue)'}}>{k}</span>={v}</div>)}
          </div>}
        </div>}

        {section==='secrets' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Configs ({(svc.configs||[]).length})</h4>
          {(svc.configs||[]).length ? <table><thead><tr><th>Name</th><th>Target</th><th>Mode</th></tr></thead>
            <tbody>{svc.configs.map((c,i)=><tr key={i}><td>{c.ConfigName||c.ConfigID}</td><td style={{fontFamily:'monospace',fontSize:12}}>{c.File?.Name}</td><td>{c.File?.Mode}</td></tr>)}</tbody>
          </table> : <div style={{color:'var(--muted)'}}>No hay configs</div>}
          <h4 style={{fontSize:14,fontWeight:600,marginTop:16,marginBottom:12}}>Secrets ({(svc.secrets||[]).length})</h4>
          {(svc.secrets||[]).length ? <table><thead><tr><th>Name</th><th>Target</th><th>Mode</th></tr></thead>
            <tbody>{svc.secrets.map((s,i)=><tr key={i}><td>{s.SecretName||s.SecretID}</td><td style={{fontFamily:'monospace',fontSize:12}}>{s.File?.Name}</td><td>{s.File?.Mode}</td></tr>)}</tbody>
          </table> : <div style={{color:'var(--muted)'}}>No hay secrets</div>}
        </div>}

        {section==='tasks' && <div className="card fade-in">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Tasks ({(svc.tasks||[]).length})</h4>
          <table><thead><tr><th>ID</th><th>Nombre</th><th>Nodo</th><th>Estado</th><th>Error</th></tr></thead>
            <tbody>{(svc.tasks||[]).map((t,i)=><tr key={i}>
              <td style={{fontFamily:'monospace',fontSize:12}}>{(t.ID||'').substring(0,12)}</td>
              <td>{t.Name}</td><td>{t.Node}</td>
              <td><StatusBadge status={t.CurrentState?.split(' ')[0]||t.DesiredState}/><div style={{fontSize:11,color:'var(--muted)'}}>{t.CurrentState}</div></td>
              <td style={{fontSize:12,color:'var(--red)',maxWidth:250,overflow:'hidden',textOverflow:'ellipsis'}}>{t.Error||'-'}</td>
            </tr>)}</tbody>
          </table>
        </div>}

        {section==='logs' && <div className="card fade-in">
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <h4 style={{fontSize:14,fontWeight:600}}>Service logs</h4>
            <button className="btn btn-sm" onClick={loadLogs}>Actualizar</button>
          </div>
          {logsLoading ? <div style={{textAlign:'center',padding:20}}><span className="spinner"/></div>
            : <div className="log-viewer">{logs||'Sin logs'}</div>}
        </div>}
      </div>

      {/* Quick navigation sidebar */}
      <div style={{width:200,flexShrink:0}}>
        <div className="card" style={{position:'sticky',top:0}}>
          <h4 style={{fontSize:13,fontWeight:600,marginBottom:8}}>Quick navigation</h4>
          {sections.map(s=><div key={s.id} style={{padding:'5px 8px',fontSize:12,cursor:'pointer',borderRadius:4,color:section===s.id?'var(--accent)':'var(--muted)',background:section===s.id?'rgba(229,112,0,.1)':'transparent',marginBottom:2,transition:'all .15s'}}
            onClick={()=>{setSection(s.id);if(s.id==='logs'&&!logs)loadLogs();}}
            onMouseEnter={e=>{if(section!==s.id)e.currentTarget.style.color='var(--text)';}}
            onMouseLeave={e=>{if(section!==s.id)e.currentTarget.style.color='var(--muted)';}}
          >{s.label}</div>)}
        </div>
      </div>
    </div>
  </>;
}

// Services
function Services({ data, onScale, onRestart, onLogs, onTasks, toast }) {
  const [selectedService, setSelectedService] = useState(null);
  const [filter, setFilter] = useState('');

  if (selectedService) return <ServiceDetail serviceId={selectedService} onBack={()=>setSelectedService(null)} toast={toast} />;

  if (!data || !data.length) return <div className="card" style={{padding:20,color:'var(--muted)'}}>Sin servicios</div>;

  const filtered = data.filter(s => {
    const name = (s.Name || '').toLowerCase();
    const stack = (s.stack || '').toLowerCase();
    const f = filter.toLowerCase();
    return !f || name.includes(f) || stack.includes(f);
  });

  return <>
    <div style={{marginBottom:12}}>
      <input placeholder="Filtrar servicios..." value={filter} onChange={e=>setFilter(e.target.value)} style={{maxWidth:300}} />
    </div>
    <div className="card" style={{overflowX:'auto'}}>
      <table>
        <thead><tr><th>Servicio</th><th>Stack</th><th>Image</th><th>Replicas</th><th>Ports</th><th>Updated</th><th>Acciones</th></tr></thead>
        <tbody>{filtered.map((s,i) => {
          const img = (s.Image || s.image_full || '').split('@')[0];
          const shortImg = img.includes('/') ? img.split('/').pop() : img;
          return <tr key={i}>
            <td><strong style={{cursor:'pointer',color:'var(--accent)'}} onClick={()=>setSelectedService(s.Name)}>{s.Name}</strong><div style={{fontSize:11,color:'var(--muted)',fontFamily:'monospace'}}>{(s.ID||'').substring(0,12)}</div></td>
            <td>{s.stack ? <span className="badge badge-blue">{s.stack}</span> : '-'}</td>
            <td style={{fontSize:12,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}} title={img}>{shortImg}</td>
            <td><span style={{fontWeight:600}}>{s.Replicas}</span>{s.mode_type === 'global' && <span className="badge badge-muted" style={{marginLeft:4}}>global</span>}</td>
            <td style={{fontSize:12,fontFamily:'monospace'}}>{s.Ports || '-'}</td>
            <td style={{fontSize:12,color:'var(--muted)'}}>{fmtAgo(s.updated || s.UpdatedAt)}</td>
            <td style={{whiteSpace:'nowrap'}}>
              <button className="btn btn-sm" onClick={()=>onTasks(s)} title="Tasks">Tasks</button>{' '}
              <button className="btn btn-sm" onClick={()=>onLogs(s.Name||s.ID)} title="Logs">Logs</button>{' '}
              {s.mode_type !== 'global' && <button className="btn btn-sm" onClick={()=>onScale(s)} title="Scale">Scale</button>}{' '}
              <button className="btn btn-sm" onClick={()=>onRestart(s.Name||s.ID)} title="Restart">Restart</button>
            </td>
          </tr>;
        })}</tbody>
      </table>
    </div>
    <div style={{marginTop:8,fontSize:12,color:'var(--muted)'}}>{filtered.length} de {data.length} servicios</div>
  </>;
}

// Stacks — full Portainer-style management
function Stacks({ data, onRemove, toast }) {
  const [selected, setSelected] = useState(null); // selected stack name
  const [detail, setDetail] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);
  const [compose, setCompose] = useState(null);
  const [composeLoading, setComposeLoading] = useState(false);
  const [stackLogs, setStackLogs] = useState(null);
  const [logsLoading, setLogsLoading] = useState(false);
  const [activeView, setActiveView] = useState('services'); // services|compose|logs|env
  const [deployModal, setDeployModal] = useState(false);
  const [deployName, setDeployName] = useState('');
  const [deployYaml, setDeployYaml] = useState('');
  const [deploying, setDeploying] = useState(false);

  const selectStack = async (name) => {
    setSelected(name); setActiveView('services'); setDetail(null); setCompose(null); setStackLogs(null);
    setDetailLoading(true);
    const d = await api(`stack-detail?name=${encodeURIComponent(name)}`);
    setDetail(d); setDetailLoading(false);
  };

  const loadCompose = async () => {
    setComposeLoading(true);
    const d = await api(`stack-compose?name=${encodeURIComponent(selected)}`);
    setCompose(d); setComposeLoading(false);
  };

  const loadLogs = async () => {
    setLogsLoading(true);
    const d = await api(`stack-logs?name=${encodeURIComponent(selected)}&tail=100`);
    setStackLogs(d); setLogsLoading(false);
  };

  const doDeploy = async () => {
    if (!deployName || !deployYaml) return;
    setDeploying(true);
    const r = await api('stack-deploy', {method:'POST', body:{stack_name:deployName, compose_yaml:deployYaml}});
    setDeploying(false);
    if (r.success) { toast('Stack desplegado','success'); setDeployModal(false); setDeployName(''); setDeployYaml(''); }
    else toast(r.error||'Error','error');
  };

  const doRedeploy = async (name) => {
    if (!compose?.compose) { toast('Carga el compose primero','error'); return; }
    if (!confirm(`Redesplegar stack ${name}? Esto actualizara los servicios.`)) return;
    const r = await api('stack-deploy', {method:'POST', body:{stack_name:name, compose_yaml:compose.compose}});
    if (r.success) { toast(`Stack ${name} redesplegado`,'success'); selectStack(name); }
    else toast(r.error||'Error','error');
  };

  if (!data || !data.length) return <div className="card" style={{padding:20,color:'var(--muted)'}}>Sin stacks</div>;

  // Stack detail view
  if (selected && detail) {
    const svcs = detail.services || [];
    const totalRunning = svcs.reduce((acc,s) => {
      const r = (s.Replicas||'').split('/');
      return acc + (parseInt(r[0])||0);
    }, 0);
    const totalDesired = svcs.reduce((acc,s) => {
      const r = (s.Replicas||'').split('/');
      return acc + (parseInt(r[1]||r[0])||0);
    }, 0);
    const healthy = totalRunning === totalDesired && totalDesired > 0;

    return <>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button className="btn btn-sm" onClick={()=>{setSelected(null);setDetail(null);}}>← Volver</button>
        <h3 style={{fontSize:16,fontWeight:700}}>{selected}</h3>
        <span className={`badge ${healthy?'badge-green':'badge-yellow'}`}>{healthy?'Healthy':'Degraded'}</span>
        <span className="badge badge-blue">{svcs.length} servicios</span>
        <span style={{fontSize:12,color:'var(--muted)'}}>{totalRunning}/{totalDesired} replicas</span>
      </div>

      <div className="tabs">
        <div className={`tab ${activeView==='services'?'active':''}`} onClick={()=>setActiveView('services')}>Servicios ({svcs.length})</div>
        <div className={`tab ${activeView==='compose'?'active':''}`} onClick={()=>{setActiveView('compose');if(!compose)loadCompose();}}>Compose</div>
        <div className={`tab ${activeView==='logs'?'active':''}`} onClick={()=>{setActiveView('logs');loadLogs();}}>Logs</div>
        <div className={`tab ${activeView==='env'?'active':''}`} onClick={()=>setActiveView('env')}>Variables</div>
        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          {healthy ? <button className="btn btn-sm" style={{background:'var(--red)',borderColor:'var(--red)',color:'#fff'}} onClick={async()=>{if(!confirm(`Detener stack ${selected}? Todos los servicios se escalaran a 0.`))return;const r=await api('stack-stop',{method:'POST',body:{stack_name:selected}});if(r.success){toast(r.message,'success');selectStack(selected);}else toast(r.error,'error');}}>Stop Stack</button>
          : <button className="btn btn-sm" style={{background:'var(--green)',borderColor:'var(--green)',color:'#fff'}} onClick={async()=>{const r=await api('stack-start',{method:'POST',body:{stack_name:selected}});if(r.success){toast(r.message,'success');selectStack(selected);}else toast(r.error,'error');}}>Start Stack</button>}
          {compose && <button className="btn btn-sm btn-primary" onClick={()=>doRedeploy(selected)}>Redeploy</button>}
          <button className="btn btn-sm btn-danger" onClick={()=>{onRemove(selected);setSelected(null);}}>Remove Stack</button>
        </div>
      </div>

      {activeView==='services' && <div className="card fade-in" style={{overflowX:'auto'}}>
        <table>
          <thead><tr><th>Servicio</th><th>Image</th><th>Replicas</th><th>Puertos</th><th>Estado Tasks</th><th>Acciones</th></tr></thead>
          <tbody>{svcs.map((s,i) => {
            const img = (s.image_full || s.Image || '').split('/').pop();
            const tasks = s.tasks || [];
            const running = tasks.filter(t=>(t.CurrentState||'').toLowerCase().startsWith('running')).length;
            const failed = tasks.filter(t=>(t.CurrentState||'').toLowerCase().includes('failed')).length;
            const ports = (s.ports_detail||[]).map(p=>`${p.PublishedPort||''}:${p.TargetPort||''}`).filter(p=>p!==':').join(', ');
            return <tr key={i}>
              <td><strong>{(s.Name||'').replace(selected+'_','')}</strong><div style={{fontSize:11,color:'var(--muted)',fontFamily:'monospace'}}>{s.Name}</div></td>
              <td style={{fontSize:12,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}} title={s.image_full}>{img}</td>
              <td><span style={{fontWeight:600,color:running>0?'var(--green)':'var(--red)'}}>{s.Replicas}</span>{s.mode_type==='global'&&<span className="badge badge-muted" style={{marginLeft:4}}>global</span>}</td>
              <td style={{fontSize:12,fontFamily:'monospace'}}>{ports||'-'}</td>
              <td>
                <div style={{display:'flex',gap:4}}>
                  {running>0&&<span className="badge badge-green">{running} running</span>}
                  {failed>0&&<span className="badge badge-red">{failed} failed</span>}
                  {tasks.length===0&&<span className="badge badge-muted">no tasks</span>}
                </div>
              </td>
              <td style={{whiteSpace:'nowrap'}}>
                <button className="btn btn-sm" onClick={async()=>{const r=await api('service-restart',{method:'POST',body:{service_id:s.Name}});if(r.success){toast(s.Name+' reiniciado','success');selectStack(selected);}else toast(r.error,'error');}}>Restart</button>{' '}
                {s.mode_type!=='global'&&<button className="btn btn-sm" onClick={()=>{const n=prompt('Replicas:',s.Replicas?.split('/').pop()||'1');if(n!==null)api('service-scale',{method:'POST',body:{service_id:s.Name,replicas:parseInt(n)}}).then(r=>{if(r.success){toast('Escalado','success');selectStack(selected);}else toast(r.error,'error');});}}>Scale</button>}
              </td>
            </tr>;
          })}</tbody>
        </table>
      </div>}

      {activeView==='compose' && <div className="card fade-in">
        {composeLoading ? <div style={{textAlign:'center',padding:30}}><span className="spinner"/></div> : compose ? <>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:12,color:'var(--muted)'}}>Fuente: {compose.source==='stack-config'?'docker stack config':'Reconstruido desde inspects'}</span>
            <button className="btn btn-sm" onClick={()=>{navigator.clipboard.writeText(compose.compose);toast('Copiado al portapapeles','success');}}>Copiar</button>
          </div>
          <textarea value={compose.compose} onChange={e=>setCompose({...compose,compose:e.target.value})} style={{fontFamily:'monospace',fontSize:12,minHeight:400,background:'#000',color:'#0f0',padding:12,borderRadius:8,width:'100%',border:'1px solid var(--border)',resize:'vertical'}} />
        </> : <div style={{color:'var(--muted)'}}>Error cargando compose</div>}
      </div>}

      {activeView==='logs' && <div className="card fade-in">
        {logsLoading ? <div style={{textAlign:'center',padding:30}}><span className="spinner"/></div>
          : <><div style={{marginBottom:8,fontSize:12,color:'var(--muted)'}}>{stackLogs?.services||0} servicios · <button className="btn btn-sm" onClick={loadLogs}>Actualizar</button></div>
            <div className="log-viewer">{stackLogs?.logs||'Sin logs'}</div></>}
      </div>}

      {activeView==='env' && <div className="card fade-in">
        <h4 style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>Variables de entorno por servicio</h4>
        {svcs.map((s,i) => {
          const envVars = s.env_vars || [];
          if (!envVars.length) return null;
          return <div key={i} style={{marginBottom:16}}>
            <h5 style={{fontSize:13,fontWeight:600,marginBottom:6}}>{(s.Name||'').replace(selected+'_','')}<span style={{color:'var(--muted)',fontWeight:400}}> ({envVars.length} vars)</span></h5>
            <div style={{background:'var(--bg)',borderRadius:6,padding:8,fontSize:12,fontFamily:'monospace',maxHeight:200,overflow:'auto'}}>
              {envVars.map((e,j)=>{
                const [k,...v]=e.split('=');
                const val=v.join('=');
                const isSensitive=/password|secret|key|token|api_key/i.test(k);
                return <div key={j} style={{padding:'2px 0',borderBottom:'1px solid var(--border)'}}>
                  <span style={{color:'var(--blue)'}}>{k}</span>=<span style={{color:isSensitive?'var(--red)':'var(--green)'}}>{isSensitive?'••••••••':val}</span>
                </div>;
              })}
            </div>
          </div>;
        })}
        {svcs.every(s=>!(s.env_vars||[]).length) && <div style={{color:'var(--muted)'}}>No hay variables de entorno configuradas</div>}
      </div>}

      {detail.networks && detail.networks.length>0 && activeView==='services' && <div className="card" style={{marginTop:12}}>
        <h4 style={{fontSize:13,color:'var(--muted)',marginBottom:8}}>Redes del Stack</h4>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {detail.networks.map((n,i)=><span key={i} className="badge badge-blue">{n.Name} ({n.Driver})</span>)}
        </div>
      </div>}
    </>;
  }

  if (selected && detailLoading) return <div style={{textAlign:'center',padding:40}}><span className="spinner"/> Cargando {selected}...</div>;

  // Stack list view
  return <>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
      <span style={{fontSize:13,color:'var(--muted)'}}>{data.length} stacks</span>
      <button className="btn btn-primary btn-sm" onClick={()=>setDeployModal(true)}>+ Deploy Stack</button>
    </div>
    <div className="grid-3">
      {data.map((s,i) => {
        const svcCount = typeof s.Services === 'number' ? s.Services : parseInt(s.Services) || 0;
        const status = s.status || 'unknown';
        const isRunning = status === 'running';
        const isPartial = status === 'partial';
        const isStopped = status === 'stopped';
        const statusColor = isRunning ? 'var(--green)' : isPartial ? 'var(--yellow)' : 'var(--red)';
        const statusText = isRunning ? 'Running' : isPartial ? 'Partial' : isStopped ? 'Stopped' : 'Unknown';
        const borderColor = isRunning ? 'rgba(34,197,94,.3)' : isPartial ? 'rgba(234,179,8,.3)' : isStopped ? 'rgba(239,68,68,.3)' : 'var(--border)';

        return <div key={i} className="card fade-in" style={{cursor:'pointer',transition:'all .2s',borderLeft:`3px solid ${statusColor}`,border:`1px solid ${borderColor}`}} onClick={()=>selectStack(s.Name)}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.transform='translateY(-2px)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor=borderColor;e.currentTarget.style.borderLeft=`3px solid ${statusColor}`;e.currentTarget.style.transform='none';}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:statusColor,display:'inline-block',animation:isRunning?'pulse 2s ease-in-out infinite':'none'}}/>
              <h4 style={{fontSize:15,fontWeight:700}}>{s.Name}</h4>
            </div>
            <span className="badge badge-green">{svcCount} svcs</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <span style={{fontSize:12,fontWeight:600,color:statusColor}}>{statusText}</span>
            <span style={{fontSize:11,color:'var(--muted)'}}>{s.running||0}/{s.desired||0} replicas</span>
          </div>
          <div style={{marginBottom:6}}>
            <div style={{height:4,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${s.desired>0?(s.running/s.desired*100):0}%`,background:statusColor,borderRadius:2,transition:'width .4s ease'}}/>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:11,color:'var(--muted)'}}>{s.svc_running||0}/{s.svc_total||0} servicios activos</span>
            {isRunning || isPartial ? <button className="btn btn-sm" style={{fontSize:11,padding:'2px 8px',background:'rgba(239,68,68,.15)',color:'var(--red)',borderColor:'rgba(239,68,68,.3)'}} onClick={e=>{e.stopPropagation();if(!confirm(`Detener ${s.Name}?`))return;api('stack-stop',{method:'POST',body:{stack_name:s.Name}}).then(r=>{if(r.success)toast('Detenido','success');});}}>Stop</button>
            : <button className="btn btn-sm" style={{fontSize:11,padding:'2px 8px',background:'rgba(34,197,94,.15)',color:'var(--green)',borderColor:'rgba(34,197,94,.3)'}} onClick={e=>{e.stopPropagation();api('stack-start',{method:'POST',body:{stack_name:s.Name}}).then(r=>{if(r.success)toast('Iniciado','success');});}}>Start</button>}
          </div>
        </div>;
      })}
    </div>

    {deployModal && <Modal title="Deploy Stack" onClose={()=>setDeployModal(false)}>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:12,color:'var(--muted)',marginBottom:4,display:'block'}}>Nombre del Stack</label>
        <input value={deployName} onChange={e=>setDeployName(e.target.value)} placeholder="my-stack" />
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:12,color:'var(--muted)',marginBottom:4,display:'block'}}>Docker Compose YAML</label>
        <textarea value={deployYaml} onChange={e=>setDeployYaml(e.target.value)} placeholder="version: '3.8'&#10;services:&#10;  web:&#10;    image: nginx" style={{fontFamily:'monospace',fontSize:12,minHeight:250,resize:'vertical'}} />
      </div>
      <button className="btn btn-primary" onClick={doDeploy} disabled={deploying||!deployName||!deployYaml}>
        {deploying?<><span className="spinner" style={{width:14,height:14}}/> Desplegando...</>:'Deploy Stack'}
      </button>
    </Modal>}
  </>;
}

// Containers — Portainer-style with multi-select, bulk actions, pagination, state filter
function Containers({ data, onLogs, onAction, toast }) {
  const [filter, setFilter] = useState('');
  const [stateFilter, setStateFilter] = useState('all');
  const [selected, setSelected] = useState(new Set());
  const [page, setPage] = useState(1);
  const [perPage, setPerPage] = useState(10);
  const [sortCol, setSortCol] = useState('Names');
  const [sortAsc, setSortAsc] = useState(true);

  const containers = data?.containers || [];

  const filtered = containers.filter(c => {
    const f = filter.toLowerCase();
    const state = (c.State||'').toLowerCase();
    const matchFilter = !f || (c.Names||'').toLowerCase().includes(f) || (c.Image||'').toLowerCase().includes(f) || (c._node||'').toLowerCase().includes(f);
    const matchState = stateFilter==='all' || state===stateFilter;
    return matchFilter && matchState;
  }).sort((a,b) => {
    const va = (a[sortCol]||'').toString().toLowerCase();
    const vb = (b[sortCol]||'').toString().toLowerCase();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  const totalPages = Math.ceil(filtered.length / perPage);
  const paged = filtered.slice((page-1)*perPage, page*perPage);

  const toggleSelect = (id) => { const s=new Set(selected); s.has(id)?s.delete(id):s.add(id); setSelected(s); };
  const selectAll = () => { if(selected.size===paged.length){setSelected(new Set());}else{setSelected(new Set(paged.map(c=>c.ID||c.Names)));} };

  const bulkAction = async (action) => {
    if(selected.size===0)return;
    if(!confirm(`${action} ${selected.size} contenedores?`))return;
    let ok=0;
    for(const id of selected){
      const c = containers.find(x=>(x.ID||x.Names)===id);
      const r=await api('container-action',{method:'POST',body:{container_id:id,action,host:c?._host||''}});
      if(r.success)ok++;
    }
    toast(`${action}: ${ok}/${selected.size} exitosos`,'success');
    setSelected(new Set());
    onAction(null,null,true); // signal reload
  };

  const SortHeader = ({col, children}) => <th style={{cursor:'pointer',userSelect:'none'}} onClick={()=>{if(sortCol===col)setSortAsc(!sortAsc);else{setSortCol(col);setSortAsc(true);}}}>
    {children} {sortCol===col ? (sortAsc?'↑':'↓') : ''}
  </th>;

  const stateColor = (s) => {
    s = (s||'').toLowerCase();
    if(s==='running') return {bg:'rgba(34,197,94,.15)',color:'var(--green)',text:'running'};
    if(s==='exited') return {bg:'rgba(239,68,68,.15)',color:'var(--red)',text:'exited'};
    if(s==='paused') return {bg:'rgba(234,179,8,.15)',color:'var(--yellow)',text:'paused'};
    if(s==='created') return {bg:'rgba(59,130,246,.15)',color:'var(--blue)',text:'created'};
    return {bg:'rgba(113,113,122,.15)',color:'var(--muted)',text:s||'unknown'};
  };

  // Get stack name from container labels (docker appends it)
  const getStack = (c) => {
    const labels = c.Labels || '';
    const m = labels.match(/com\.docker\.stack\.namespace=([^,]+)/);
    return m ? m[1] : '-';
  };

  const runningCount = containers.filter(c=>(c.State||'').toLowerCase()==='running').length;
  const stoppedCount = containers.filter(c=>(c.State||'').toLowerCase()!=='running').length;

  return <>
    {/* Top bar with actions */}
    <div className="card" style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',marginBottom:12,flexWrap:'wrap'}}>
      <span style={{fontSize:13,fontWeight:600,marginRight:4}}>Containers</span>
      <input placeholder="Search..." value={filter} onChange={e=>{setFilter(e.target.value);setPage(1);}} style={{maxWidth:200,padding:'4px 8px'}} />
      <div style={{display:'flex',gap:4,borderLeft:'1px solid var(--border)',paddingLeft:8,marginLeft:4}}>
        <button className="btn btn-sm" disabled={selected.size===0} onClick={()=>bulkAction('start')}>Start</button>
        <button className="btn btn-sm" disabled={selected.size===0} onClick={()=>bulkAction('stop')}>Stop</button>
        <button className="btn btn-sm" disabled={selected.size===0} onClick={()=>bulkAction('kill')}>Kill</button>
        <button className="btn btn-sm" disabled={selected.size===0} onClick={()=>bulkAction('restart')}>Restart</button>
        <button className="btn btn-sm" disabled={selected.size===0} onClick={()=>bulkAction('pause')}>Pause</button>
        <button className="btn btn-sm" disabled={selected.size===0} onClick={()=>bulkAction('unpause')}>Resume</button>
        <button className="btn btn-sm btn-danger" disabled={selected.size===0} onClick={()=>bulkAction('remove')}>Remove</button>
      </div>
      <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
        <span style={{fontSize:11,color:'var(--muted)'}}>{runningCount} running / {stoppedCount} stopped</span>
      </div>
    </div>

    {/* State filter tabs */}
    <div style={{display:'flex',gap:4,marginBottom:12}}>
      {[{id:'all',label:`All (${containers.length})`},{id:'running',label:`Running (${runningCount})`},{id:'exited',label:`Stopped (${containers.filter(c=>(c.State||'')==='exited').length})`},{id:'paused',label:'Paused'}].map(f=>
        <button key={f.id} className={`btn btn-sm ${stateFilter===f.id?'btn-primary':''}`} onClick={()=>{setStateFilter(f.id);setPage(1);}}>{f.label}</button>
      )}
    </div>

    {/* Table */}
    <div className="card" style={{overflowX:'auto',padding:0}}>
      <table>
        <thead><tr>
          <th style={{width:30}}><input type="checkbox" checked={selected.size===paged.length&&paged.length>0} onChange={selectAll}/></th>
          <SortHeader col="Names">Name</SortHeader>
          <SortHeader col="State">State</SortHeader>
          <th>Quick Actions</th>
          <th>Stack</th>
          <SortHeader col="Image">Image</SortHeader>
          <SortHeader col="CreatedAt">Created</SortHeader>
          <th>IP Address</th>
          <th>Node</th>
        </tr></thead>
        <tbody>{paged.map((c,i) => {
          const id = c.ID || c.Names;
          const sc = stateColor(c.State);
          const status = c.Status || '';
          const stack = getStack(c);
          // Extract IP from Networks field if available
          const networks = c.Networks || '';
          return <tr key={i} style={{background:selected.has(id)?'rgba(229,112,0,.05)':''}}>
            <td><input type="checkbox" checked={selected.has(id)} onChange={()=>toggleSelect(id)}/></td>
            <td>
              <strong style={{fontSize:13}}>{c.Names}</strong>
              <div style={{fontSize:11,color:'var(--muted)',fontFamily:'monospace'}}>{(c.ID||'').substring(0,12)}</div>
            </td>
            <td>
              <span style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:9999,fontSize:11,fontWeight:600,background:sc.bg,color:sc.color}}>
                {status || sc.text}
              </span>
            </td>
            <td style={{whiteSpace:'nowrap'}}>
              <button className="btn btn-sm" title="Logs" onClick={()=>onLogs(c.ID,c._host)} style={{padding:'2px 5px'}}>L</button>{' '}
              <button className="btn btn-sm" title="Restart" onClick={()=>onAction(id,'restart',false,c._host)} style={{padding:'2px 5px'}}>R</button>{' '}
              {(c.State||'')==='running'
                ? <button className="btn btn-sm" title="Stop" onClick={()=>onAction(id,'stop',false,c._host)} style={{padding:'2px 5px'}}>S</button>
                : <button className="btn btn-sm" title="Start" onClick={()=>onAction(id,'start',false,c._host)} style={{padding:'2px 5px'}}>P</button>
              }
            </td>
            <td>{stack!=='-' ? <span className="badge badge-blue">{stack}</span> : '-'}</td>
            <td style={{fontSize:12,maxWidth:250,overflow:'hidden',textOverflow:'ellipsis'}} title={c.Image}>{c.Image}</td>
            <td style={{fontSize:12,color:'var(--muted)',whiteSpace:'nowrap'}}>{c.CreatedAt || c.RunningFor}</td>
            <td style={{fontFamily:'monospace',fontSize:12}}>{networks || '-'}</td>
            <td><span className="badge badge-muted">{c._node||'-'}</span></td>
          </tr>;
        })}</tbody>
      </table>
    </div>

    {/* Pagination */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12}}>
      <div style={{fontSize:12,color:'var(--muted)'}}>{filtered.length} contenedores</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:12,color:'var(--muted)'}}>Items per page</span>
        <select value={perPage} onChange={e=>{setPerPage(parseInt(e.target.value));setPage(1);}} style={{width:60,padding:'2px 4px'}}>
          <option value={10}>10</option><option value={25}>25</option><option value={50}>50</option><option value={100}>100</option>
        </select>
        <div style={{display:'flex',gap:2}}>
          <button className="btn btn-sm" disabled={page<=1} onClick={()=>setPage(page-1)}>‹</button>
          {Array.from({length:Math.min(totalPages,5)},(_,i)=>{
            let p;
            if(totalPages<=5)p=i+1;
            else if(page<=3)p=i+1;
            else if(page>=totalPages-2)p=totalPages-4+i;
