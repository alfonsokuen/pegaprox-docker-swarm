            else p=page-2+i;
            return <button key={p} className={`btn btn-sm ${page===p?'btn-primary':''}`} onClick={()=>setPage(p)}>{p}</button>;
          })}
          {totalPages>5 && page<totalPages-2 && <span style={{color:'var(--muted)'}}>...</span>}
          {totalPages>5 && page<totalPages-2 && <button className="btn btn-sm" onClick={()=>setPage(totalPages)}>{totalPages}</button>}
          <button className="btn btn-sm" disabled={page>=totalPages} onClick={()=>setPage(page+1)}>›</button>
        </div>
      </div>
    </div>
  </>;
}

        {Array.from({length:Math.min(totalPages,5)},(_,i)=><button key={i+1} className={`btn btn-sm ${page===i+1?'btn-primary':''}`} onClick={()=>setPage(i+1)}>{i+1}</button>)}

// Images — Portainer style with Pull, multi-node, Host column, Remove
function Images({ data, toast }) {
  const [filter, setFilter] = useState('');
  const [selected, setSelected] = useState(new Set());
  const [pullImage, setPullImage] = useState('');
  const [pullHost, setPullHost] = useState('');
  const [pulling, setPulling] = useState(false);
  const [page, setPage] = useState(1);
  const perPage = 10;
  const imgs = data?.images || [];
  const filtered = imgs.filter(img => {
    const f = filter.toLowerCase();
    return !f || (img.Repository||'').toLowerCase().includes(f) || (img.Tag||'').toLowerCase().includes(f) || (img._node||'').toLowerCase().includes(f);
  });
  const totalPages = Math.ceil(filtered.length / perPage);
  const paged = filtered.slice((page-1)*perPage, page*perPage);
  const toggle = id => { const s=new Set(selected); s.has(id)?s.delete(id):s.add(id); setSelected(s); };

  // Get unique hosts for pull dropdown
  const hosts = [...new Set(imgs.map(i=>i._node).filter(Boolean))];

  const doPull = async () => {
    if(!pullImage)return;
    setPulling(true);
    const body = {image:pullImage};
    if(pullHost){
      const img = imgs.find(i=>i._node===pullHost);
      if(img) body.host = img._host;
    }
    const r = await api('image-pull',{method:'POST',body});
    setPulling(false);
    if(r.success) toast('Imagen descargada','success');
    else toast(r.error||'Error','error');
  };

  const removeSelected = async () => {
    if(!confirm(`Eliminar ${selected.size} imagenes?`))return;
    let ok=0;
    for(const key of selected){
      const [id,host] = key.split('|');
      const r = await api('image-remove',{method:'POST',body:{image_id:id,host}});
      if(r.success)ok++;
    }
    toast(`${ok} imagenes eliminadas`,'success'); setSelected(new Set());
  };

  // Check if image is used by running containers
  const isUnused = (img) => (img.Repository||'')==='<none>' || (img.Tag||'')==='<none>';

  return <>
    {/* Pull image section */}
    <div className="card" style={{marginBottom:12}}>
      <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Pull image</h4>
      <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
        <div style={{flex:1}}>
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Image</label>
          <div style={{display:'flex',gap:0}}>
            <span style={{background:'var(--border)',padding:'6px 10px',borderRadius:'6px 0 0 6px',fontSize:12,color:'var(--muted)'}}>docker.io</span>
            <input value={pullImage} onChange={e=>setPullImage(e.target.value)} placeholder="e.g. nginx:latest" style={{borderRadius:'0 6px 6px 0',borderLeft:'none'}} />
          </div>
        </div>
        <div>
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Node</label>
          <select value={pullHost} onChange={e=>setPullHost(e.target.value)} style={{width:160}}>
            <option value="">Any (manager)</option>
            {hosts.map(h=><option key={h} value={h}>{h}</option>)}
          </select>
        </div>
        <button className="btn btn-primary" onClick={doPull} disabled={pulling||!pullImage}>
          {pulling ? <><span className="spinner" style={{width:14,height:14}}/> Pulling...</> : 'Pull the image'}
        </button>
      </div>
    </div>

    {/* Image list */}
    <div className="card" style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',marginBottom:12}}>
      <span style={{fontSize:13,fontWeight:600}}>Images</span>
      <input placeholder="Search..." value={filter} onChange={e=>{setFilter(e.target.value);setPage(1);}} style={{maxWidth:200,padding:'4px 8px'}} />
      <button className="btn btn-sm btn-danger" disabled={selected.size===0} onClick={removeSelected}>Remove</button>
      <div style={{marginLeft:'auto',fontSize:11,color:'var(--muted)'}}>{imgs.length} imagenes en {hosts.length} nodos</div>
    </div>
    <div className="card" style={{overflowX:'auto',padding:0}}>
      <table>
        <thead><tr>
          <th style={{width:30}}><input type="checkbox" onChange={()=>{if(selected.size===paged.length)setSelected(new Set());else setSelected(new Set(paged.map(i=>`${i.ID}|${i._host}`)));}} checked={selected.size===paged.length&&paged.length>0}/></th>
          <th>Id</th><th>Tags</th><th>Size</th><th>Created</th><th>Host</th>
        </tr></thead>
        <tbody>{paged.map((img,i) => {
          const key = `${img.ID}|${img._host}`;
          const tag = `${img.Repository}:${img.Tag}`;
          const unused = isUnused(img);
          return <tr key={i}>
            <td><input type="checkbox" checked={selected.has(key)} onChange={()=>toggle(key)}/></td>
            <td style={{fontFamily:'monospace',fontSize:12,color:'var(--blue)'}}>{(img.ID||'').substring(0,25)}...</td>
            <td>{tag !== '<none>:<none>' ? tag : '-'} {unused && <span className="badge badge-yellow" style={{marginLeft:4}}>Unused</span>}</td>
            <td>{img.Size}</td>
            <td style={{fontSize:12,color:'var(--muted)',whiteSpace:'nowrap'}}>{img.CreatedAt?.substring(0,19) || img.CreatedSince}</td>
            <td><span className="badge badge-muted">{img._node}</span></td>
          </tr>;
        })}</tbody>
      </table>
    </div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
      <span style={{fontSize:12,color:'var(--muted)'}}>{filtered.length} imagenes</span>
      {totalPages>1 && <div style={{display:'flex',gap:2}}>
        <button className="btn btn-sm" disabled={page<=1} onClick={()=>setPage(page-1)}>‹</button>
        {Array.from({length:Math.min(totalPages,5)},(_,i)=><button key={i+1} className={`btn btn-sm ${page===i+1?'btn-primary':''}`} onClick={()=>setPage(i+1)}>{i+1}</button>)}
        {totalPages>5 && <><span style={{color:'var(--muted)'}}>...</span><button className="btn btn-sm" onClick={()=>setPage(totalPages)}>{totalPages}</button></>}
        <button className="btn btn-sm" disabled={page>=totalPages} onClick={()=>setPage(page+1)}>›</button>
      </div>}
    </div>
  </>;
}

// Settings
function Settings({ onSave, toast }) {
  const [config, setConfig] = useState(null);
  const [hosts, setHosts] = useState([]);
  const [poll, setPoll] = useState(30);
  const [testing, setTesting] = useState(null);
  const [testResult, setTestResult] = useState(null);

  useEffect(() => { api('config').then(d => { setConfig(d); setHosts(d.swarm_hosts||[]); setPoll(d.poll_interval||30); }); }, []);

  const addHost = () => setHosts([...hosts, {name:'',host:'',user:'',password:''}]);
  const removeHost = i => setHosts(hosts.filter((_,j)=>j!==i));
  const updateHost = (i,field,val) => { const h=[...hosts]; h[i]={...h[i],[field]:val}; setHosts(h); };

  const save = async () => {
    const r = await api('config/save', {method:'POST', body:{swarm_hosts:hosts, poll_interval:poll}});
    if (r.success) toast('Configuracion guardada','success');
    else toast(r.error||'Error','error');
  };

  const testConn = async (i) => {
    setTesting(i); setTestResult(null);
    const h = hosts[i];
    const pwd = h.password === '***' ? '' : h.password;
    if (!pwd) { toast('Ingresa la password para probar','error'); setTesting(null); return; }
    const r = await api('test-connection', {method:'POST', body:{host:h.host,user:h.user,password:pwd}});
    setTestResult({index:i, ...r}); setTesting(null);
  };

  if (!config) return <div style={{textAlign:'center',padding:40}}><div className="spinner"/></div>;

  return <div className="card">
    <h3 style={{fontSize:15,fontWeight:600,marginBottom:16}}>Configuracion Docker Swarm</h3>

    <div style={{marginBottom:16}}>
      <label style={{fontSize:12,color:'var(--muted)',marginBottom:4,display:'block'}}>Intervalo de polling (segundos)</label>
      <input type="number" value={poll} onChange={e=>setPoll(parseInt(e.target.value)||30)} min={10} max={300} style={{maxWidth:120}} />
    </div>

    <h4 style={{fontSize:13,color:'var(--muted)',marginBottom:8}}>Hosts Swarm (SSH)</h4>
    {hosts.map((h,i) => <div key={i} style={{border:'1px solid var(--border)',borderRadius:8,padding:12,marginBottom:8}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:8}}>
        <div><label style={{fontSize:11,color:'var(--muted)'}}>Nombre</label><input value={h.name} onChange={e=>updateHost(i,'name',e.target.value)} placeholder="IASERVER01"/></div>
        <div><label style={{fontSize:11,color:'var(--muted)'}}>Host/IP</label><input value={h.host} onChange={e=>updateHost(i,'host',e.target.value)} placeholder="190.160.10.129"/></div>
        <div><label style={{fontSize:11,color:'var(--muted)'}}>Usuario</label><input value={h.user} onChange={e=>updateHost(i,'user',e.target.value)} placeholder="alfonso"/></div>
        <div><label style={{fontSize:11,color:'var(--muted)'}}>Password</label><input type="password" value={h.password} onChange={e=>updateHost(i,'password',e.target.value)}/></div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-sm" onClick={()=>testConn(i)} disabled={testing===i}>
          {testing===i ? <><span className="spinner" style={{width:14,height:14}}/> Probando...</> : 'Probar conexion'}
        </button>
        <button className="btn btn-sm btn-danger" onClick={()=>removeHost(i)}>Eliminar</button>
        {testResult && testResult.index===i && <span style={{fontSize:12,color:testResult.success?'var(--green)':'var(--red)',alignSelf:'center'}}>
          {testResult.success ? `OK - Swarm activo, ${testResult.nodes} nodos, ${testResult.managers} managers` : testResult.error}
        </span>}
      </div>
    </div>)}

    <div style={{display:'flex',gap:8,marginTop:12}}>
      <button className="btn" onClick={addHost}>+ Agregar Host</button>
      <button className="btn btn-primary" onClick={save}>Guardar Configuracion</button>
    </div>

    <DiskAutoPruneSettings toast={toast} />
  </div>;
}

// ============== LOAD BALANCE ==============

function NodeBalanceCard({ node: n, maxTasks, rebalancing, onRebalance }) {
  const [expanded, setExpanded] = useState(false);
  const cpuColor = n.cpu_percent > 80 ? 'var(--red)' : n.cpu_percent > 50 ? 'var(--yellow)' : 'var(--green)';
  const memColor = n.mem_percent > 80 ? 'var(--red)' : n.mem_percent > 50 ? 'var(--yellow)' : 'var(--green)';
  const taskBarPct = (n.tasks_running / maxTasks) * 100;

  return <div className="card" style={{padding:16}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <div>
        <div style={{fontSize:15,fontWeight:700}}>{n.name}</div>
        <div style={{fontSize:11,color:'var(--muted)',fontFamily:'monospace'}}>{n.host} {n.node_id && `(${n.node_id})`}</div>
      </div>
      <div style={{fontSize:28,fontWeight:800,color:'var(--text)'}}>{n.tasks_running}</div>
    </div>

    {/* Tasks bar */}
    <div style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginBottom:4}}>
        <span>Tasks</span><span>{n.tasks_running} / {maxTasks}</span>
      </div>
      <ProgressBar percent={taskBarPct} color="#3b82f6" />
    </div>

    {/* CPU */}
    <div style={{marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginBottom:4}}>
        <span>CPU ({n.cpu_count} cores)</span><span style={{color:cpuColor,fontWeight:600}}>{n.cpu_percent}%</span>
      </div>
      <ProgressBar percent={n.cpu_percent} color={cpuColor} />
    </div>

    {/* RAM */}
    <div style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginBottom:4}}>
        <span>RAM</span><span style={{color:memColor,fontWeight:600}}>{n.mem_total ? `${fmtBytes(n.mem_used)} / ${fmtBytes(n.mem_total)}` : '-'} ({n.mem_percent}%)</span>
      </div>
      <ProgressBar percent={n.mem_percent} color={memColor} />
    </div>

    {/* Services list (collapsible) */}
    {n.services && n.services.length > 0 && <>
      <div onClick={()=>setExpanded(!expanded)} style={{cursor:'pointer',fontSize:12,color:'var(--accent)',display:'flex',alignItems:'center',gap:4,marginBottom:expanded?8:0}}>
        <span style={{transform:expanded?'rotate(90deg)':'none',transition:'transform .2s',display:'inline-block'}}>&#9654;</span>
        {n.services.length} servicios
      </div>
      {expanded && <div style={{maxHeight:200,overflow:'auto'}}>
        {n.services.map((svc,si) => <div key={si} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
          <span style={{fontFamily:'monospace'}}>{svc}</span>
          <button className="btn btn-sm" style={{fontSize:10,padding:'2px 8px'}}
            disabled={rebalancing===svc} onClick={()=>onRebalance(svc)}>
            {rebalancing===svc ? '...' : 'Rebalancear'}
          </button>
        </div>)}
      </div>}
    </>}
  </div>;
}

function LoadBalance({ data, toast }) {
  const [rebalancing, setRebalancing] = useState(null);

  if (!data) return <div className="card" style={{padding:20,color:'var(--muted)'}}>Sin datos de balance</div>;
  if (data.error) return <div className="card" style={{padding:20,color:'var(--red)'}}>{data.error}</div>;

  const { nodes, total_tasks, balance_score, recommendation } = data;
  const scoreColor = balance_score >= 80 ? 'var(--green)' : balance_score >= 50 ? 'var(--yellow)' : 'var(--red)';
  const maxTasks = Math.max(...nodes.map(n => n.tasks_running), 1);

  const doRebalance = async (svcName) => {
    if (!confirm(`Rebalancear ${svcName}? Esto forzara un re-deploy del servicio.`)) return;
    setRebalancing(svcName);
    try {
      const r = await api('rebalance-service', {method:'POST', body:{service_name: svcName}});
      if (r.success) toast(`${svcName} rebalanceando...`, 'success');
      else toast(r.error || 'Error', 'error');
    } catch(e) { toast('Error de conexion', 'error'); }
    setRebalancing(null);
  };

  return <div>
    {/* Score + Summary */}
    <div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:16,marginBottom:16}}>
      <div className="card" style={{padding:20,textAlign:'center'}}>
        <div style={{fontSize:48,fontWeight:800,color:scoreColor,lineHeight:1}}>{balance_score}</div>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Balance Score</div>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>{total_tasks} tasks en {nodes.length} nodos</div>
      </div>
      <div className="card" style={{padding:20}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Distribucion de Tasks</div>
        {/* Stacked bar */}
        <div style={{display:'flex',height:32,borderRadius:6,overflow:'hidden',marginBottom:12}}>
          {nodes.map((n,i) => {
            const pct = total_tasks > 0 ? (n.tasks_running / total_tasks) * 100 : 0;
            const colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6'];
            return <div key={i} title={`${n.name}: ${n.tasks_running} tasks (${pct.toFixed(0)}%)`}
              style={{width:`${pct}%`,background:colors[i%colors.length],minWidth:pct>0?2:0,transition:'width .3s'}} />;
          })}
        </div>
        <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
          {nodes.map((n,i) => {
            const colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6'];
            const pct = total_tasks > 0 ? ((n.tasks_running / total_tasks) * 100).toFixed(0) : 0;
            return <div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
              <span style={{width:10,height:10,borderRadius:2,background:colors[i%colors.length],display:'inline-block'}} />
              {n.name}: {n.tasks_running} ({pct}%)
            </div>;
          })}
        </div>
        {recommendation && <div style={{marginTop:12,padding:'8px 12px',background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:6,fontSize:12,color:'var(--yellow)'}}>
          {recommendation}
        </div>}
      </div>
    </div>

    {/* Node Cards */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(360px, 1fr))',gap:16}}>
      {nodes.map((n, i) => <NodeBalanceCard key={i} node={n} maxTasks={maxTasks} rebalancing={rebalancing} onRebalance={doRebalance} />)}
    </div>
  </div>;
}

// ============== APP ==============

function App() {
  const [tab, setTab] = useState('dashboard');
  const [overview, setOverview] = useState(null);
  const [nodeStats, setNodeStats] = useState(null);
  const [nodes, setNodes] = useState(null);
  const [services, setServices] = useState(null);
  const [stacks, setStacks] = useState(null);
  const [containers, setContainers] = useState(null);
  const [networks, setNetworks] = useState(null);
  const [volumes, setVolumes] = useState(null);
  const [images, setImages] = useState(null);
  const [loadBalance, setLoadBalance] = useState(null);
  const [loading, setLoading] = useState(false);
  const [toastMsg, setToastMsg] = useState(null);
  const [modal, setModal] = useState(null);
  const [logs, setLogs] = useState('');
  const [logsLoading, setLogsLoading] = useState(false);
  const refreshRef = useRef(null);
  const [countdown, setCountdown] = useState(15);
  const countdownRef = useRef(null);
  const REFRESH_INTERVAL = 15; // seconds

  const toast = (msg, type='info') => setToastMsg({msg,type});

  const loadTab = useCallback(async (t) => {
    setLoading(true);
    try {
      switch(t) {
        case 'dashboard':
          const [ov, ns, lb] = await Promise.all([api('overview'), api('node-stats'), api('load-balance')]);
          setOverview(ov); setNodeStats(ns); setLoadBalance(lb); break;
        case 'nodes': setNodes(await api('nodes')); break;
        case 'services': setServices(await api('services')); break;
        case 'stacks': setStacks(await api('stacks')); break;
        case 'containers': setContainers(await api('containers')); break;
        case 'networks': setNetworks(await api('networks')); break;
        case 'volumes': setVolumes(await api('volumes')); break;
        case 'images': setImages(await api('images')); break;
        case 'loadbalance': setLoadBalance(await api('load-balance')); break;
      }
    } catch(e) { toast('Error cargando datos','error'); }
    setLoading(false);
  }, []);

  useEffect(() => { loadTab(tab); }, [tab]);

  // Auto-refresh dashboard with visible countdown
  useEffect(() => {
    if (tab === 'dashboard') {
      setCountdown(REFRESH_INTERVAL);
      countdownRef.current = setInterval(() => {
        setCountdown(prev => {
          if (prev <= 1) {
            loadTab('dashboard');
            return REFRESH_INTERVAL;
          }
          return prev - 1;
        });
      }, 1000);
    }
    return () => { if (countdownRef.current) clearInterval(countdownRef.current); };
  }, [tab]);

  const showLogs = async (id, type='service') => {
    setModal({type:'logs', title:`Logs: ${id}`}); setLogs(''); setLogsLoading(true);
    const endpoint = type === 'container' ? 'container-logs' : 'service-logs';
    const param = type === 'container' ? 'container_id' : 'service_id';
    const r = await api(`${endpoint}?${param}=${encodeURIComponent(id)}&tail=200`);
    setLogs(r.logs || r.error || 'Sin logs'); setLogsLoading(false);
  };

  const scaleService = (svc) => {
    const current = (svc.Replicas||'').split('/').pop() || svc.replicas_spec || 1;
    setModal({type:'scale', svc, current: parseInt(current)||1});
  };

  const doScale = async (svcName, replicas) => {
    const r = await api('service-scale', {method:'POST', body:{service_id:svcName,replicas}});
    if (r.success) { toast(`${svcName} escalado a ${replicas}`,'success'); setModal(null); loadTab('services'); }
    else toast(r.error||'Error','error');
  };

  const doRestart = async (svcName) => {
    if (!confirm(`Reiniciar servicio ${svcName}?`)) return;
    const r = await api('service-restart', {method:'POST', body:{service_id:svcName}});
    if (r.success) { toast(`${svcName} reiniciado`,'success'); loadTab('services'); }
    else toast(r.error||'Error','error');
  };

  const showTasks = async (svc) => {
    setModal({type:'tasks', title:`Tasks: ${svc.Name}`, tasks:null});
    const r = await api(`tasks?service_id=${encodeURIComponent(svc.Name||svc.ID)}`);
    setModal(m => ({...m, tasks: r.tasks||[]}));
  };

  const doContainerAction = async (id, action) => {
    if (!confirm(`${action} container ${id}?`)) return;
    const r = await api('container-action', {method:'POST', body:{container_id:id,action}});
    if (r.success) { toast(`Container ${action}ed`,'success'); loadTab('containers'); }
    else toast(r.error||'Error','error');
  };

  const doStackRemove = async (name) => {
    if (!confirm(`ELIMINAR stack ${name}? Esto eliminara todos sus servicios.`)) return;
    const r = await api('stack-remove', {method:'POST', body:{stack_name:name}});
    if (r.success) { toast(`Stack ${name} eliminado`,'success'); loadTab('stacks'); }
    else toast(r.error||'Error','error');
  };

  const tabs = [
    {id:'dashboard', label:'Dashboard', icon:'#'},
    {id:'nodes', label:'Nodos', icon:'N'},
    {id:'services', label:'Servicios', icon:'S'},
    {id:'stacks', label:'Stacks', icon:'K'},
    {id:'containers', label:'Contenedores', icon:'C'},
    {id:'networks', label:'Redes', icon:'R'},
    {id:'volumes', label:'Volumenes', icon:'V'},
    {id:'images', label:'Imagenes', icon:'I'},
    {id:'loadbalance', label:'Balance', icon:'B'},
    {id:'settings', label:'Ajustes', icon:'*'},
  ];

  return <>
    <div className="sidebar">
      <div style={{padding:'0 20px 16px',borderBottom:'1px solid var(--border)',marginBottom:8}}>
        <div style={{fontSize:16,fontWeight:700,color:'var(--accent)'}}>Docker Swarm</div>
        <div style={{fontSize:11,color:'var(--muted)'}}>PegaProx Plugin</div>
      </div>
      {tabs.map(t => <div key={t.id} className={`sidebar-item ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
        <span style={{width:20,textAlign:'center',fontWeight:700,fontSize:14}}>{t.icon}</span> {t.label}
      </div>)}
      <div style={{position:'absolute',bottom:16,left:0,right:0,textAlign:'center',fontSize:11,color:'var(--muted)'}}>
        <a href="/" style={{color:'var(--accent)',textDecoration:'none'}}>Volver a PegaProx</a>
      </div>
    </div>

    <div className="main">
      <div className="header" style={{position:'relative'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <h2 style={{fontSize:18,fontWeight:600}}>{tabs.find(t=>t.id===tab)?.label}</h2>
          {tab==='dashboard' && <span style={{fontSize:11,color:'var(--muted)',display:'flex',alignItems:'center',gap:4}}><span className="live-dot" style={{width:6,height:6}}/> {countdown}s</span>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {loading && <span className="spinner"/>}
          <button className="btn" onClick={()=>{loadTab(tab);setCountdown(REFRESH_INTERVAL);}}>Refresh</button>
        </div>
        {tab==='dashboard' && <div className="countdown-bar" style={{width:`${(countdown/REFRESH_INTERVAL)*100}%`}}/>}
      </div>

      {tab==='dashboard' && <Dashboard overview={overview} nodeStats={nodeStats} loadBalance={loadBalance} loading={loading} />}
      {tab==='nodes' && <Nodes data={nodes} />}
      {tab==='services' && <Services data={services} onScale={scaleService} onRestart={doRestart} onLogs={id=>showLogs(id,'service')} onTasks={showTasks} toast={toast} />}
      {tab==='stacks' && <Stacks data={stacks} onRemove={doStackRemove} toast={toast} />}
      {tab==='containers' && <Containers data={containers} onLogs={(id,host)=>showLogs(id,'container')} onAction={(id,action,reload,host)=>{if(reload){loadTab('containers');return;}doContainerAction(id,action);}} toast={toast} />}
      {tab==='networks' && <Networks data={networks} toast={toast} />}
      {tab==='volumes' && <Volumes data={volumes} toast={toast} />}
      {tab==='images' && <Images data={images} toast={toast} />}
      {tab==='loadbalance' && <LoadBalance data={loadBalance} toast={toast} />}
      {tab==='settings' && <Settings onSave={()=>loadTab('dashboard')} toast={toast} />}
    </div>

    {/* Modals */}
    {modal?.type==='logs' && <Modal title={modal.title} onClose={()=>setModal(null)}>
      {logsLoading ? <div style={{textAlign:'center',padding:20}}><span className="spinner"/></div>
        : <div className="log-viewer">{logs}</div>}
    </Modal>}

    {modal?.type==='scale' && <Modal title={`Escalar: ${modal.svc.Name}`} onClose={()=>setModal(null)}>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:12,color:'var(--muted)'}}>Replicas actuales: {modal.current}</label>
        <input type="number" id="scaleInput" defaultValue={modal.current} min={0} max={100} style={{marginTop:4}} />
      </div>
      <button className="btn btn-primary" onClick={()=>doScale(modal.svc.Name||modal.svc.ID, parseInt(document.getElementById('scaleInput').value))}>
        Aplicar Scale
      </button>
    </Modal>}

    {modal?.type==='tasks' && <Modal title={modal.title} onClose={()=>setModal(null)}>
      {!modal.tasks ? <div style={{textAlign:'center',padding:20}}><span className="spinner"/></div>
        : <table>
          <thead><tr><th>ID</th><th>Nombre</th><th>Nodo</th><th>Estado</th><th>Error</th></tr></thead>
          <tbody>{modal.tasks.map((t,i) => <tr key={i}>
            <td style={{fontFamily:'monospace',fontSize:12}}>{(t.ID||'').substring(0,12)}</td>
            <td>{t.Name}</td>
            <td>{t.Node}</td>
            <td><StatusBadge status={t.CurrentState?.split(' ')[0] || t.DesiredState} /><div style={{fontSize:11,color:'var(--muted)'}}>{t.CurrentState}</div></td>
            <td style={{fontSize:12,color:'var(--red)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{t.Error || '-'}</td>
          </tr>)}</tbody>
        </table>
      }
    </Modal>}

    {toastMsg && <Toast msg={toastMsg.msg} type={toastMsg.type} onClose={()=>setToastMsg(null)} />}
  </>;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
